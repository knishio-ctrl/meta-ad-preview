<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta 広告プレビュー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',Arial,sans-serif;background:#f2f2f7;color:#1a1a1a}
header{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:600}
.badge{font-size:12px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:12px}
.container{max-width:1140px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tab{padding:8px 20px;font-size:13px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;cursor:pointer;font-weight:500}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.pane{display:none}
.pane.on{display:grid;grid-template-columns:270px 1fr;gap:20px;align-items:start}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px}
.spec{background:#f0f7ff;border-left:3px solid #0095f6;border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:#444;line-height:1.8;margin-bottom:14px}
.spec b{color:#1a1a1a;font-weight:600}
.sep{height:1px;background:#f0f0f0;margin:14px 0}
.field{margin-bottom:12px}
.field label{font-size:12px;color:#555;display:block;margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;resize:none}
.field input:focus,.field textarea:focus{outline:none;border-color:#0095f6}
.cc{font-size:11px;color:#aaa;text-align:right;margin-top:2px}
.cc.warn{color:#e74c3c}
.upbtn{width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#666;text-align:center}
.upbtn:hover{border-color:#0095f6;color:#0095f6;background:#f0f7ff}
.thumb{width:100%;height:70px;object-fit:cover;border-radius:6px;margin-top:6px;border:1px solid #eee;display:none}
.pv-wrap{background:#e8e8e8;border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px}
.pv-lbl{font-size:12px;color:#888;font-weight:500}
.pv-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.sz-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:#555;cursor:pointer}
.dl-btn{padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#333;font-weight:500}
.dl-note{font-size:11px;color:#888;min-height:16px}

/* ===== iPhone共通 ===== */
.phone-wrap{position:relative;width:260px;height:530px;flex-shrink:0}
.phone-wrap svg.frame{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;overflow:visible}
.phone-screen{position:absolute;top:8px;left:8px;width:244px;height:514px;border-radius:40px;overflow:hidden;background:#000;z-index:1}

/* ===== Story ===== */
.st-wrap{position:absolute;inset:0;overflow:hidden;background:#111}
.st-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;object-position:center top;display:block;z-index:0;background:#000}
.st-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;text-align:center;padding:16px;line-height:1.6;z-index:0}
/* status bar */
.sbar{position:absolute;top:12px;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 18px;pointer-events:none}
.sbar-time{font-size:11px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sbar-icons{display:flex;align-items:center;gap:4px}
/* progress */
.st-prog{position:absolute;top:36px;left:8px;right:8px;display:flex;gap:2px;z-index:20}
.st-bar{flex:1;height:1.5px;background:rgba(255,255,255,.35);border-radius:1px;overflow:hidden}
.st-bar-fill{height:100%;background:#fff;border-radius:1px}
/* header */
.st-hdr{position:absolute;top:42px;left:8px;right:8px;display:flex;align-items:center;gap:6px;z-index:20}
.st-av{width:26px;height:26px;border-radius:50%;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.st-name{font-size:10px;font-weight:700;color:#fff;line-height:1.2}
.st-meta{font-size:8px;color:rgba(255,255,255,.8)}
.st-hdr-dots{margin-left:auto;color:#fff;font-size:14px;line-height:1}
/* footer */
.st-foot{position:absolute;bottom:0;left:0;right:0;padding:0 8px;z-index:20}
.st-ad-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.st-ad-label{font-size:10px;color:rgba(255,255,255,.9);font-weight:600}
.st-ad-icons{display:flex;gap:12px}
.st-cta-big{background:#fff;border-radius:24px;padding:10px 14px;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;cursor:pointer}
.st-cta-big-txt{font-size:12px;font-weight:700;color:#000}
.st-interest-row{display:flex;gap:6px;margin-bottom:8px}
.st-interest-btn{flex:1;background:rgba(40,40,40,.85);border:none;border-radius:20px;padding:8px;font-size:10px;color:#fff;cursor:pointer;text-align:center}
.st-home-bar{width:80px;height:3px;background:rgba(255,255,255,.4);border-radius:2px;margin:4px auto 8px}

/* ===== Reel ===== */
.rl-wrap{position:absolute;inset:0;overflow:hidden;background:#000}
.rl-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;object-position:center top;display:block;z-index:0;background:#000}
.rl-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;text-align:center;padding:16px;line-height:1.6;z-index:0}
.rl-topbar{position:absolute;top:42px;left:0;right:0;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.rl-title{font-size:13px;font-weight:700;color:#fff}
/* right sidebar */
.rl-side{position:absolute;right:6px;bottom:64px;display:flex;flex-direction:column;gap:12px;align-items:center;z-index:20}
.rl-side-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.rl-side-av{width:26px;height:26px;border-radius:50%;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.rl-plus{width:12px;height:12px;background:#0095f6;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;margin-top:-6px;border:1px solid #000}
.rl-side-lbl{font-size:8px;color:#fff;font-weight:500}
/* bottom */
.rl-bottom{position:absolute;bottom:44px;left:0;right:50px;padding:0 10px;z-index:20}
.rl-acc{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.rl-av{width:20px;height:20px;border-radius:50%;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.rl-pgname{font-size:10px;font-weight:700;color:#fff}
.rl-sp-txt{font-size:8px;color:rgba(255,255,255,.8)}
.rl-follow-btn{padding:2px 6px;border:1px solid #fff;border-radius:4px;background:transparent;color:#fff;font-size:8px;font-weight:700;cursor:pointer}
.rl-cap{font-size:9px;color:#fff;line-height:1.4;margin-bottom:3px}
.rl-music-row{display:flex;align-items:center;gap:3px;font-size:8px;color:rgba(255,255,255,.85)}
.rl-cta{background:rgba(255,255,255,.2);border:0.5px solid rgba(255,255,255,.4);border-radius:5px;padding:5px 10px;margin-top:5px;font-size:9px;color:#fff;font-weight:600;text-align:center}
/* nav */
.rl-nav{position:absolute;bottom:0;left:0;right:0;height:40px;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:space-around;z-index:20;border-top:.5px solid rgba(255,255,255,.08)}
.home-bar-rl{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:80px;height:3px;background:rgba(255,255,255,.35);border-radius:2px;z-index:25}

/* ===== Feed ===== */
.fd-inner{position:absolute;inset:0;background:#fff;overflow:hidden;display:flex;flex-direction:column;padding-top:42px}
.fd-card-hdr{padding:7px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.fd-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.fd-pg{font-size:11px;font-weight:700;color:#000;line-height:1.2}
.fd-pg-sub{font-size:9px;color:#8e8e8e}
.fd-follow{margin-left:auto;padding:4px 10px;border:1px solid #dbdbdb;border-radius:6px;background:#fff;font-size:10px;font-weight:600;color:#000;cursor:pointer;flex-shrink:0}
.fd-dots-btn{margin-left:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.fd-media{width:100%;background:#e8eaed;position:relative;overflow:hidden;flex-shrink:0}
.fd-media img{width:100%;height:100%;object-fit:cover;display:block}
.fd-media-ph{font-size:10px;color:#888;text-align:center;padding:30px 12px;line-height:1.6}
.fd-cta-row{padding:7px 10px;border-top:.5px solid #dbdbdb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fd-cta-txt{font-size:11px;font-weight:600;color:#000}
.fd-cta-arrow{font-size:13px;color:#000}
.fd-dots-row{display:flex;justify-content:center;gap:4px;padding:3px 0;flex-shrink:0}
.fd-dot{width:5px;height:5px;border-radius:50%;background:#dbdbdb}
.fd-dot.on{background:#0095f6}
.fd-actions{padding:5px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fd-acts-left{display:flex;gap:12px;align-items:center}
.fd-caption{padding:0 10px 4px;font-size:10px;color:#000;line-height:1.5;flex-shrink:0}
.fd-caption b{font-weight:700}
.fd-ad-label{font-size:9px;color:#8e8e8e;padding:0 10px 4px;flex-shrink:0}
.fd-nav{padding:5px 0 4px;display:flex;justify-content:space-around;align-items:center;border-top:.5px solid #dbdbdb;background:#fff;flex-shrink:0;margin-top:auto}
.fd-home-bar{width:80px;height:3px;background:rgba(0,0,0,.18);border-radius:2px;margin:3px auto 5px;flex-shrink:0}

/* ===== セーフゾーン ===== */
.sz-block{position:absolute;z-index:15;pointer-events:none}
.sz-tag{position:absolute;z-index:16;pointer-events:none;font-size:7px;font-weight:700;color:#ff3b30;background:rgba(0,0,0,.65);padding:1px 4px;border-radius:2px;white-space:nowrap}
</style>
</head>
<body>
<header>
  <h1>Meta 広告プレビュー</h1>
  <span class="badge">社内用</span>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab on" onclick="sw('story',this)">IG ストーリーズ</button>
    <button class="tab" onclick="sw('reel',this)">IG リール</button>
    <button class="tab" onclick="sw('feed',this)">IG インフィード</button>
  </div>

  <!-- ストーリーズ -->
  <div class="pane on" id="pane-story">
    <div class="panel">
      <div class="spec"><b>推奨:</b> 1440×2560px（9:16）<br><b>本文:</b> 最大125字<br><b>セーフゾーン:</b> 上14% / 下20%</div>
      <div class="sep"></div>
      <div class="field"><label>ページ名</label><input type="text" id="st-pg" placeholder="例：Nike Japan" oninput="rSt()"></div>
      <div class="field"><label>本文テキスト（最大125字）</label><textarea id="st-body" rows="3" maxlength="125" oninput="cc(this,'st-c1');rSt()"></textarea><div class="cc" id="st-c1">0 / 125</div></div>
      <div class="field"><label>CTAボタン</label><input type="text" id="st-cta" placeholder="詳しくはこちら" oninput="rSt()"></div>
      <div class="field"><button class="upbtn" onclick="pick('story')">+ バナー画像（1440×2560px）</button><img id="story-thumb" class="thumb"></div>
    </div>
    <div class="pv-wrap">
      <div class="pv-lbl">Instagram ストーリーズ プレビュー</div>
      <div class="phone-wrap" id="pw-st"><div class="phone-screen" id="sc-st"></div></div>
      <div class="pv-actions">
        <label class="sz-lbl"><input type="checkbox" id="sz-st" onchange="rSt()"> セーフゾーン</label>
        <button class="dl-btn" onclick="dl('pw-st','igst')">↓ PNG保存</button>
      </div>
      <div class="dl-note" id="dn-st"></div>
    </div>
  </div>

  <!-- リール -->
  <div class="pane" id="pane-reel">
    <div class="panel">
      <div class="spec"><b>推奨:</b> 1440×2560px（9:16）<br><b>本文:</b> 最大72字<br><b>セーフゾーン:</b> 上14% / 下35〜40% / 両側6%</div>
      <div class="sep"></div>
      <div class="field"><label>ページ名</label><input type="text" id="rl-pg" placeholder="例：Nike Japan" oninput="rRl()"></div>
      <div class="field"><label>本文テキスト（最大72字）</label><textarea id="rl-body" rows="2" maxlength="72" oninput="cc(this,'rl-c1');rRl()"></textarea><div class="cc" id="rl-c1">0 / 72</div></div>
      <div class="field"><label>CTAボタン</label><input type="text" id="rl-cta" placeholder="詳しくはこちら" oninput="rRl()"></div>
      <div class="field"><button class="upbtn" onclick="pick('reel')">+ バナー画像（1440×2560px）</button><img id="reel-thumb" class="thumb"></div>
    </div>
    <div class="pv-wrap">
      <div class="pv-lbl">Instagram リール プレビュー</div>
      <div class="phone-wrap" id="pw-rl"><div class="phone-screen" id="sc-rl"></div></div>
      <div class="pv-actions">
        <label class="sz-lbl"><input type="checkbox" id="sz-rl" onchange="rRl()"> セーフゾーン</label>
        <button class="dl-btn" onclick="dl('pw-rl','igrl')">↓ PNG保存</button>
      </div>
      <div class="dl-note" id="dn-rl"></div>
    </div>
  </div>

  <!-- インフィード -->
  <div class="pane" id="pane-feed">
    <div class="panel">
      <div class="spec"><b>推奨:</b> 1080×1080px（1:1）/ 1080×1350px（4:5）<br><b>本文:</b> 最大150字<br><b>CTA:</b> 最大27字</div>
      <div class="sep"></div>
      <div class="field"><label>ページ名</label><input type="text" id="fd-pg" placeholder="例：Nike Japan" oninput="rFd()"></div>
      <div class="field"><label>本文テキスト（最大150字）</label><textarea id="fd-body" rows="3" maxlength="150" oninput="cc(this,'fd-c1');rFd()"></textarea><div class="cc" id="fd-c1">0 / 150</div></div>
      <div class="field"><label>CTAボタン（最大27字）</label><input type="text" id="fd-cta" maxlength="27" placeholder="詳しくはこちら" oninput="cc(this,'fd-c2');rFd()"><div class="cc" id="fd-c2">0 / 27</div></div>
      <div class="field"><label>表示URL</label><input type="text" id="fd-url" placeholder="example.com" oninput="rFd()"></div>
      <div class="field"><label>画像サイズ</label><select id="fd-ratio" onchange="rFd()"><option value="1:1">1:1（1080×1080px）</option><option value="4:5">4:5（1080×1350px）</option></select></div>
      <div class="field"><button class="upbtn" onclick="pick('feed')">+ バナー画像</button><img id="feed-thumb" class="thumb"></div>
    </div>
    <div class="pv-wrap">
      <div class="pv-lbl">Instagram インフィード プレビュー</div>
      <div class="phone-wrap" id="pw-fd"><div class="phone-screen" id="sc-fd"></div></div>
      <div class="pv-actions">
        <button class="dl-btn" onclick="dl('pw-fd','igfd')">↓ PNG保存</button>
      </div>
      <div class="dl-note" id="dn-fd"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
var imgs={};
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function cc(el,id){var n=el.value.length,max=parseInt(el.getAttribute('maxlength')),c=document.getElementById(id);if(c){c.textContent=n+' / '+max;c.className='cc'+(n>=max*.9?' warn':'');}}
function sw(key,btn){document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});btn.classList.add('on');document.getElementById('pane-'+key).classList.add('on');}
function pick(key){
  var fi=document.getElementById('fi-'+key);
  if(!fi){fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.id='fi-'+key;fi.style.display='none';document.body.appendChild(fi);}
  fi.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){imgs[key]=ev.target.result;var th=document.getElementById(key+'-thumb');if(th){th.src=ev.target.result;th.style.display='block';}if(key==='story')rSt();else if(key==='reel')rRl();else rFd();};r.readAsDataURL(f);};fi.click();
}

function mkFrame(pwId){
  var pw=document.getElementById(pwId);if(!pw)return;
  var old=pw.querySelector('svg.frame');if(old&&old.parentNode===pw)pw.removeChild(old);
  var W=260,H=530,SX=8,SY=8,SR=40;
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('class','frame');
  var mid='m'+pwId.replace(/[^a-z0-9]/g,'');
  var defs=document.createElementNS(ns,'defs');
  var mask=document.createElementNS(ns,'mask');mask.setAttribute('id',mid);
  function mr(x,y,w,h,rx,fill){var el=document.createElementNS(ns,'rect');el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('width',w);el.setAttribute('height',h);el.setAttribute('rx',rx);el.setAttribute('fill',fill);return el;}
  mask.appendChild(mr(-10,-10,W+20,H+20,0,'white'));
  mask.appendChild(mr(SX,SY,W-SX*2,H-SY*2,SR,'black'));
  defs.appendChild(mask);svg.appendChild(defs);
  function r(x,y,w,h,rx,fill){var el=document.createElementNS(ns,'rect');el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('width',w);el.setAttribute('height',h);el.setAttribute('rx',rx);el.setAttribute('fill',fill);svg.appendChild(el);}
  function c(cx,cy,rad,fill){var el=document.createElementNS(ns,'circle');el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('r',rad);el.setAttribute('fill',fill);svg.appendChild(el);}
  var body=document.createElementNS(ns,'rect');body.setAttribute('x','0');body.setAttribute('y','0');body.setAttribute('width',W);body.setAttribute('height',H);body.setAttribute('rx','46');body.setAttribute('fill','#c8c8c8');body.setAttribute('mask','url(#'+mid+')');svg.appendChild(body);
  var border=document.createElementNS(ns,'rect');border.setAttribute('x','0.5');border.setAttribute('y','0.5');border.setAttribute('width',W-1);border.setAttribute('height',H-1);border.setAttribute('rx','45.5');border.setAttribute('fill','none');border.setAttribute('stroke','#aaa');border.setAttribute('stroke-width','1');svg.appendChild(border);
  r(W/2-28,13,56,24,12,'#000');
  c(W/2+20,25,6,'#0a0a0a');c(W/2+20,25,3.5,'#111');c(W/2+20,25,1.5,'#1c1c1e');
  r(-2,H*.185,3.5,H*.05,1.5,'#aaa');r(-2,H*.258,3.5,H*.084,1.5,'#aaa');r(-2,H*.356,3.5,H*.084,1.5,'#aaa');
  r(W-1.5,H*.27,3.5,H*.12,1.5,'#aaa');
  r(W/2-46,H-10,92,3.5,1.5,'rgba(0,0,0,.15)');
  pw.appendChild(svg);
}

function sbarSVG(){
  return '<div class="sbar"><span class="sbar-time">9:41</span><div class="sbar-icons">'
    +'<svg width="14" height="10" viewBox="0 0 17 12" fill="#fff"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3"/></svg>'
    +'<svg width="13" height="10" viewBox="0 0 16 12" fill="#fff"><path d="M8 3C5.3 3 2.9 4.1 1.2 5.9L0 4.6C2.1 2.4 5 1 8 1s5.9 1.4 8 3.6L14.8 5.9C13.1 4.1 10.7 3 8 3z"/><path d="M8 6.5c-1.8 0-3.4.8-4.5 2L2 7c1.5-1.7 3.7-2.8 6-2.8s4.5 1.1 6 2.8L12.5 8.5C11.4 7.3 9.7 6.5 8 6.5z"/><circle cx="8" cy="10.5" r="2"/></svg>'

function dl(pwId,key){
  var noteId={igst:'dn-st',igrl:'dn-rl',igfd:'dn-fd'}[key]||'dn-st';
  var note=document.getElementById(noteId);
  if(note)note.textContent='生成中...';
  html2canvas(document.getElementById(pwId),{scale:2,backgroundColor:null,useCORS:true,logging:false}).then(function(c){
    var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=key+'_preview.png';a.click();
    if(note){note.textContent='保存しました';setTimeout(function(){note.textContent='';},3000);}
  }).catch(function(){if(note)note.textContent='失敗しました。';});
}
